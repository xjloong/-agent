<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模态客服智能体评测端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px; width: 6px; background: #3b82f6; border-radius: 50%; display: inline-block; margin: 0 2px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; transform: scale(0.8); } 20% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.2; transform: scale(0.8); } }
        /* 避免长文本破坏布局 */
        .msg-text { word-wrap: break-word; white-space: pre-wrap; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col justify-center items-center p-4">

    <!-- 主聊天界面窗口 -->
    <div class="bg-white w-full max-w-3xl h-[85vh] rounded-2xl shadow-xl flex flex-col overflow-hidden border border-gray-100">
        
        <!-- 头部 -->
        <div class="bg-blue-600 px-6 py-4 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-600 font-bold text-xl shadow-sm">AI</div>
                <div>
                    <h1 class="text-white font-bold text-lg">多模态客服智能体</h1>
                    <!-- 动态显示当前 Session ID -->
                    <p class="text-blue-100 text-xs" id="session-display">当前会话: 全新会话</p>
                </div>
            </div>
            <!-- 清空会话按钮，点击触发 resetSession() -->
            <button onclick="resetSession()" class="text-white text-sm hover:bg-blue-700 px-3 py-1.5 rounded transition shadow-sm border border-blue-500">
                ↻ 清空会话
            </button>
        </div>

        <!-- 聊天消息区 -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 bg-gray-50/50">
            <!-- 欢迎语 -->
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0">AI</div>
                <div class="bg-white p-4 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 text-gray-700 text-sm max-w-[85%] msg-text">您好！我是您的多模态专属客服。您可以直接向我提问，或者上传遇到问题的产品图片（最多3张）。</div>
            </div>
        </div>

        <!-- 底部输入区 -->
        <div class="bg-white border-t border-gray-100 p-4 shrink-0">
            <!-- 图片预览区 -->
            <div id="image-preview-container" class="flex gap-2 mb-2 hidden overflow-x-auto pb-2">
                <!-- 动态插入预览图 -->
            </div>

            <div class="flex items-end gap-3">
                <!-- 隐藏的图片选择器 -->
                <input type="file" id="file-input" accept="image/png, image/jpeg, image/jpg, image/webp" multiple class="hidden" onchange="handleImageSelection(event)">
                
                <!-- 上传图片按钮 -->
                <button onclick="document.getElementById('file-input').click()" class="p-3 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition shrink-0" title="上传图片 (最多3张, 仅限 PNG/JPG/WEBP)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </button>

                <!-- 文本输入框 -->
                <div class="flex-1 bg-gray-100 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-blue-100 transition">
                    <textarea id="msg-input" rows="1" class="w-full bg-transparent border-0 px-4 py-3 text-gray-700 text-sm focus:outline-none resize-none" placeholder="输入您的问题..." onkeydown="handleEnter(event)"></textarea>
                </div>

                <!-- 发送按钮 -->
                <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl shadow-md transition flex items-center justify-center shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ================= 配置与状态 =================
        const API_URL = "https://257b-115-156-245-118.ngrok-free.app/chat"; // 确保此地址与你的 FastAPI 地址一致
        const API_TOKEN = "sk_customer_20260304"; 
        
        // 【新增配置】：指定图片所在的本地文件夹路径。
        // 你需要把存放所有手册图片的文件夹重命名为 "images"，并放在与这个 index.html 同一个目录下。
        const IMAGE_BASE_URL = "./images/"; 
        
        let currentSessionId = null; 
        let selectedImagesBase64 = []; 

        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        const imgPreviewContainer = document.getElementById('image-preview-container');

        // ================= 核心：重置会话逻辑 =================
        function resetSession() {
            // 1. 将当前 session_id 彻底置空
            currentSessionId = null;
            
            // 2. 更新右上角的 UI 显示
            document.getElementById('session-display').innerText = "当前会话: 全新会话";
            
            // 3. 清空聊天面板，并给出清晰的重置提示
            chatBox.innerHTML = `
                <div class="flex items-start gap-3 mt-4">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0">AI</div>
                    <div class="bg-white p-4 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 text-green-700 text-sm max-w-[85%] msg-text">✅ 会话已清空，之前的短期记忆已重置。我们开启了一段全新的对话，请问有什么可以帮您？</div>
                </div>
            `;
            
            // 清理遗留的输入或图片
            msgInput.value = '';
            msgInput.style.height = 'auto';
            selectedImagesBase64 = [];
            imgPreviewContainer.innerHTML = '';
            imgPreviewContainer.classList.add('hidden');
        }

        // ================= 自动撑开输入框 =================
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 120 ? this.scrollHeight : 120) + 'px';
        });

        // ================= 图片处理逻辑 =================
        async function handleImageSelection(event) {
            const files = Array.from(event.target.files);
            
            if (selectedImagesBase64.length + files.length > 3) {
                alert("⚠️ 最多只能上传 3 张图片！");
                event.target.value = '';
                return;
            }

            for (let file of files) {
                if (file.size > 5 * 1024 * 1024) {
                    alert(`⚠️ 图片 ${file.name} 超过5MB限制！`);
                    continue;
                }

                try {
                    const base64Str = await convertToBase64(file);
                    selectedImagesBase64.push(base64Str);
                    renderImagePreview(base64Str, selectedImagesBase64.length - 1);
                } catch (e) {
                    alert(`⚠️ 转换图片失败: ${e.message}`);
                }
            }
            
            imgPreviewContainer.classList.remove('hidden');
            event.target.value = ''; 
        }

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function renderImagePreview(base64, index) {
            const div = document.createElement('div');
            div.className = "relative w-16 h-16 rounded-lg overflow-hidden border border-gray-200 shrink-0 group";
            div.innerHTML = `
                <img src="${base64}" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center cursor-pointer transition" onclick="removeImage(${index})">
                    <span class="text-white font-bold text-xs">✕</span>
                </div>
            `;
            imgPreviewContainer.appendChild(div);
        }

        function removeImage(index) {
            selectedImagesBase64.splice(index, 1);
            imgPreviewContainer.innerHTML = '';
            selectedImagesBase64.forEach((b64, i) => renderImagePreview(b64, i));
            if (selectedImagesBase64.length === 0) {
                imgPreviewContainer.classList.add('hidden');
            }
        }

        // ================= 发送与通信逻辑 =================
        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text && selectedImagesBase64.length === 0) return;

            // 1. 渲染用户消息
            appendUserMessage(text, selectedImagesBase64);
            
            // 构建请求体 (如果 currentSessionId 为 null，后端将视为新会话并自动生成)
            const payload = {
                question: text || "请解析图片内容",
                images: selectedImagesBase64,
                session_id: currentSessionId, 
                stream: false
            };

            // 2. 清理输入框和图片池
            msgInput.value = '';
            msgInput.style.height = 'auto';
            selectedImagesBase64 = [];
            imgPreviewContainer.innerHTML = '';
            imgPreviewContainer.classList.add('hidden');
            
            // 3. 显示打字机 Loading
            const loadingId = appendLoading();
            scrollToBottom();

            // 4. 发送网络请求
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_TOKEN}`
                    },
                    body: JSON.stringify(payload)
                });

                const resData = await response.json();
                removeElement(loadingId);

                if (!response.ok) {
                    appendSystemMessage(`❌ 请求失败 (${response.status}): ${resData.detail || resData.msg || '未知错误'}`);
                    return;
                }

                if (resData.code !== 0) {
                    appendSystemMessage(`⚠️ 服务端提示: ${resData.msg}`);
                }

                // 5. 渲染 AI 回复
                const reply = resData.data.answer;
                const imgIds = resData.data.returned_images || [];
                
                // 【核心】：接收后端返回的 session_id，后续问题都会带上它，实现短期记忆
                if (resData.data.session_id) {
                    currentSessionId = resData.data.session_id;
                    document.getElementById('session-display').innerText = `当前会话: ${currentSessionId}`;
                }

                appendAIMessage(reply, imgIds);

            } catch (error) {
                removeElement(loadingId);
                appendSystemMessage(`❌ 网络请求异常: ${error.message} (请确保 FastAPI 已启动且允许 CORS)`);
            }
            scrollToBottom();
        }

        // ================= UI 渲染工具 =================
        function appendUserMessage(text, images) {
            let imgHtml = '';
            if (images && images.length > 0) {
                imgHtml = `<div class="flex flex-wrap gap-2 mb-2">` + 
                    images.map(img => `<img src="${img}" class="w-20 h-20 rounded-md object-cover border border-blue-200">`).join('') + 
                    `</div>`;
            }
            
            const html = `
                <div class="flex items-start gap-3 flex-row-reverse">
                    <div class="w-8 h-8 bg-gray-800 rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0">我</div>
                    <div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-sm shadow-sm text-sm max-w-[85%] msg-text">${imgHtml}${text}</div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
        }

        function appendAIMessage(text, imageIds) {
            let picCounter = 0;
            
            // 【核心修复】：使用 /\s*<PIC>\s*/g 正则表达式
            // 这样能把大模型输出 <PIC> 时附带的换行符(\n)一起清理掉，防止出现巨大的空白间隙
            let formattedText = text.replace(/\s*<PIC>\s*/g, () => {
                const imgId = imageIds[picCounter] ? imageIds[picCounter] : null;
                picCounter++;
                
                if (imgId) {
                    // 【样式优化】：缩小上下边距为 my-3，减小文字和图片的距离 mb-1
                    return `
                        <div class="my-3 max-w-sm w-full">
                            <div class="flex items-center gap-1 text-xs text-gray-400 mb-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                引用配图: ${imgId}
                            </div>
                            <img src="${IMAGE_BASE_URL}${imgId}.png" 
                                 onerror="this.onerror=null; this.src='${IMAGE_BASE_URL}${imgId}.jpg';" 
                                 alt="${imgId}" 
                                 class="w-full h-auto rounded-lg shadow-sm border border-gray-200 cursor-zoom-in hover:shadow-md transition"
                                 onclick="window.open(this.src)"
                                 title="点击查看大图">
                        </div>`;
                } else {
                    return `<span class="inline-flex items-center gap-1 bg-red-50 text-red-500 px-2 py-1 rounded border border-red-200 mx-1 text-xs">⚠️ 图片数据丢失</span>`;
                }
            });

            const html = `
                <div class="flex items-start gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0">AI</div>
                    <div class="bg-white p-4 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 text-gray-700 text-sm max-w-[85%] leading-relaxed msg-text">${formattedText}</div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
        }

        function appendSystemMessage(text) {
            const html = `
                <div class="flex justify-center">
                    <span class="bg-red-50 text-red-500 px-3 py-1 rounded-full text-xs font-medium border border-red-100">${text}</span>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
        }

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const html = `
                <div id="${id}" class="flex items-start gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0">AI</div>
                    <div class="bg-white p-4 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 text-gray-700 text-sm flex items-center h-[48px]">
                        <div class="typing-indicator"><span></span><span></span><span></span></div>
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
            return id;
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
